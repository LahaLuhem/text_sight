name: example
description: "Showcase app for the text_sight plugin — live and one-shot on-device text recognition."
# Prevents accidental `flutter pub publish` of the demo.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  text_sight:
    path: ../

  # MVVM + platform-adaptive showcase stack — mirrors the sibling package examples
  # (platform_adaptive_widgets, better_internet_connectivity_checker). All pure-Dart/Flutter:
  # nothing here links a native ML/camera library, so the iOS no-bundling check still holds.
  pmvvm: ^4.0.1
  platform_adaptive_widgets: ^2.1.0
  platform_icons: ^0.1.1
  material_ui: ^0.0.1
  gap: ^3.0.1
  tap_debouncer: ^2.2.0
  cupertino_icons: ^1.0.9 # iOS nav-bar back chevron glyph under PlatformApp
  permission_handler: ^12.0.3 # runtime camera permission for the live scanner

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # BDD-style integration tests, matching the package's unit tests (same versions).
  bdd_framework: ^4.0.7
  checks: ^0.3.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_text.png
