# SwiftLint — deviations for the iOS plugin sources (the Swift under ios/). SwiftLint defaults apply
# except the rules below, which mirror the project's Dart analysis_options posture: thorough, minus
# the few opinionated rules that conflict with deliberate choices here.
#
# The example's RunnerTests are linted by a SEPARATE example/ios/.swiftlint.yml: SwiftLint resolves
# `included`/`excluded` relative to each config's own directory, so each lint config lives in the
# tree it covers, and the two carry different deviations. Paths below are relative to this file.
included:
  - text_sight/Sources/text_sight
excluded:
  - text_sight/Sources/text_sight/Messages.g.swift  # Pigeon-generated

disabled_rules:
  - file_length       # the camera/Vision file is one cohesive unit; Dart enforces no file-length cap
  - type_body_length  # likewise the camera controller type
  - trailing_comma    # trailing commas are kept, consistent with the project's Dart style

large_tuple:
  warning: 3          # displayRotation returns a 3-member named tuple — idiomatic; a struct'd be ceremony
