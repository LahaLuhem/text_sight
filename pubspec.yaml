name: text_sight
description: "Live, on-device text recognition — Apple Vision on iOS, ML Kit on Android. The text-scanning sibling to mobile_scanner."
version: 0.0.1
homepage: https://github.com/LahaLuhem/text_sight?tab=readme-ov-file
repository: https://github.com/LahaLuhem/text_sight
topics:
  - ocr
  - text-recognition
  - vision
  - mlkit
  - camera
screenshots:
  - description: >-
      Live camera text recognition with a confidence-coloured box overlay and a
      recognized-text panel.
    path: doc/screenshots/1-live-ocr.webp
  - description: >-
      One-shot still-image recognition on Android (ML Kit), with per-line confidence.
    path: doc/screenshots/2-one-shot-android.png
  - description: >-
      One-shot still-image recognition on iOS (Apple Vision), with per-line confidence.
    path: doc/screenshots/3-one-shot-ios.png




environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"




dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  meta: ^1.18.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  bdd_framework: ^4.0.7
  benchmark_harness: ^2.4.0
  pigeon: ^27.1.0
  checks: ^0.3.1
  standard_message_codec: ^0.0.1+5




flutter:
  plugin:
    platforms:
      android:
        package: com.LahaLuhem.text_sight
        pluginClass: TextSightPlugin
      ios:
        pluginClass: TextSightPlugin




cider:
  link_template:
    tag: https://github.com/LahaLuhem/text_sight/releases/tag/%tag%
    diff: https://github.com/LahaLuhem/text_sight/compare/%from%...%to%