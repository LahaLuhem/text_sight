name: text_sight
description: "Live, on-device text recognition — Apple Vision on iOS, ML Kit on Android. The text-scanning sibling to mobile_scanner."
version: 0.0.0
homepage: https://github.com/LahaLuhem/text_sight?tab=readme-ov-file
repository: https://github.com/LahaLuhem/text_sight
topics:
  - ocr
  - text-recognition
  - vision
  - mlkit
  - camera

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"




dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  meta: ^1.18.0




dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^27.1.0
  checks: ^0.3.1
  bdd_framework: ^4.0.7
  # Maintainer-only — the `benchmark/` codec micro-benchmark (excluded from the
  # published tarball via .pubignore). `standard_message_codec` is the pure-Dart
  # extraction of Flutter's platform-channel codec, so the benches run as plain
  # `dart compile exe` with no Flutter binding.
  benchmark_harness: ^2.4.0
  standard_message_codec: ^0.0.1+5




flutter:
  plugin:
    platforms:
      android:
        package: com.LahaLuhem.text_sight
        pluginClass: TextSightPlugin
      ios:
        pluginClass: TextSightPlugin




cider:
  link_template:
    tag: https://github.com/LahaLuhem/text_sight/releases/tag/%tag%
    diff: https://github.com/LahaLuhem/text_sight/compare/%from%...%to%