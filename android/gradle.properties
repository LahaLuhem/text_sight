# Read ONLY when android/ is the Gradle root (standalone module development in Android Studio). In an
# app build the host app's gradle.properties applies and this file is ignored. These mirror the
# Flutter app template so the standalone build matches the Kotlin/DSL behaviour used inside an app:
# AGP 9 defaults to built-in Kotlin + the new DSL, but Flutter's tooling isn't on those yet, so opt
# out to stay aligned with how the plugin actually compiles when consumed.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
